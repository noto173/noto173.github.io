    <p><span id="num">0</span> cones</p>
    <span id="coneincrementdisplay"></span> cones per click<br>
    <span id="conefactorydisplay"></span> cones per second<br><br>
    <span id="upgrades"></span>
</div>

<script>
let coneincrement = 1;
let autocones = 0;
let coneincrementdisplay = document.getElementById("coneincrementdisplay");
let conefactorydisplay = document.getElementById("conefactorydisplay");
let fard = document.getElementById("num");
let score = 0;
let upgrades = [];
let upgradeSpan = document.getElementById("upgrades");

let save = localStorage.getItem("coneSave")
if (save) {
		let parsedSave = JSON.parse(save);
		score = parsedSave[0];
    autocones = parsedSave[1];
    coneincrement = parsedSave[2];
}

let createUpgrade = (name,type,value,cost) => {
	let upgrade = document.createElement("button");
	upgrade.innerText = `${name} (${cost})`;
	upgrade.id = `${type}${value}`;
	switch( type ) {
		case "ac":
			upgrade.setAttribute("onclick",`upgradeAutoCone(${value},${cost});`);
			upgradeSpan.append(upgrade);
			upgrade.outerHTML += "<br><br>";
			break;
		case "ci":
		upgrade.setAttribute("onclick",`upgradeConeIncrement(${value},${cost});`);
			upgradeSpan.append(upgrade);
			upgrade.outerHTML += "<br><br>";
			break;
	};
	upgrades.push({upgrade: upgrade.id,cost});
	return upgrade;
};

createUpgrade("unpaid labor","ac",0.1,0);
createUpgrade("cone cloner","ci",1,10);
createUpgrade("cone factory","ac",1,25);
createUpgrade("child labor","ac",5,125);
createUpgrade("mega cone cloner","ci",10,200);
createUpgrade("trained professionals","ac",25,625);
createUpgrade("literal gods","ac",50,2500);

let check = (element, price) => {
	if (score>=price) {
		element.style.display = "inline";
	} else {
		element.style.display = "none";
	};
};

let tick = () => {
	upgrades.forEach(upgrade => {
		check(document.getElementById(upgrade.upgrade),upgrade.cost);
	});
	fard.innerText = Math.floor(score);
	coneincrementdisplay.innerText = Math.floor(coneincrement*10)/10;
	conefactorydisplay.innerText = Math.floor(autocones*10)/10;
	score += (autocones*(1/60));
	setTimeout(tick,(1000/60));
	let tempsave = {score,autocones,coneincrement};
	localStorage.setItem("coneSave", JSON.stringify(tempsave));
};

let increment = () => {
    score += coneincrement;
};

let upgradeConeIncrement = (x,y) => {
	coneincrement += x;
	score -= y;
};

let upgradeAutoCone = (x,y) => {
	autocones += x;
	score -= y;
};

tick();
</script>
