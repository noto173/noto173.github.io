<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS Display, Moving Squares, Auto-Clicker, and Toggle Spinning with Sound</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f0f0;
    }
    canvas {
      border: 1px solid black;
    }
    button {
      margin: 5px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <button id="spawnSquares">Spawn 1000 Blocks</button>
  <button id="toggleAutoClicker">Toggle Auto-Clicker</button>
  <button id="toggleSpinning">Toggle Spinning</button>
  <div id="fpsCounter" style="position: absolute; top: 10px; left: 10px;"></div>
  <div id="blockCount" style="position: absolute; top: 30px; left: 10px;"></div>
  <audio id="buttonSound" src="button-sound.mp3"></audio>
  <audio id="squareSound" src="square-sound.mp3"></audio>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const squares = [];

    function createSquare() {
      return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: 20,
        speedX: (Math.random() - 0.5) * 5,
        speedY: (Math.random() - 0.5) * 5,
        angle: 0,
      };
    }

    const spawnSquaresButton = document.getElementById('spawnSquares');
    spawnSquaresButton.addEventListener('click', () => {
      for (let i = 0; i < 1000; i++) {
        squares.push(createSquare());
      }
      playButtonSound();
      updateBlockCount();
    });

    const toggleAutoClickerButton = document.getElementById('toggleAutoClicker');
    let autoClickerEnabled = false;
    toggleAutoClickerButton.addEventListener('click', () => {
      autoClickerEnabled = !autoClickerEnabled;
      toggleAutoClickerButton.textContent = autoClickerEnabled ? 'Disable Auto-Clicker' : 'Enable Auto-Clicker';
      playButtonSound();
    });

    const toggleSpinningButton = document.getElementById('toggleSpinning');
    let spinningEnabled = true;
    toggleSpinningButton.addEventListener('click', () => {
      spinningEnabled = !spinningEnabled;
      toggleSpinningButton.textContent = spinningEnabled ? 'Disable Spinning' : 'Enable Spinning';
      playButtonSound();
    });

    let lastTime = performance.now();
    let fps = 0;
    let frameCount = 0;
    let totalFPS = 0;
    let blockCount = 0;

    function calculateFPS(deltaTime) {
      const currentFPS = Math.round(1000 / deltaTime);
      frameCount++;
      totalFPS += currentFPS;

      if (frameCount >= 10) {
        fps = Math.min(Math.max(Math.round(totalFPS / frameCount), 0), 1000);
        frameCount = 0;
        totalFPS = 0;
      }
    }

    function updateSquare(square) {
      if (spinningEnabled) {
        square.angle += 0.05;
      }
      square.x += square.speedX;
      square.y += square.speedY;

      if (square.x < 0 || square.x > canvas.width) {
        square.speedX *= -1;
      }

      if (square.y < 0 || square.y > canvas.height) {
        square.speedY *= -1;
      }
    }

    function gameLoop(currentTime) {
      const deltaTime = currentTime - lastTime;
      lastTime = currentTime;

      calculateFPS(deltaTime);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const square of squares) {
        updateSquare(square);
        ctx.save();
        ctx.translate(square.x, square.y);
        ctx.rotate(square.angle);
        ctx.fillStyle = 'blue';
        ctx.fillRect(-square.size / 2, -square.size / 2, square.size, square.size);
        ctx.restore();
      }

      // Draw FPS counter
      const fpsCounter = document.getElementById('fpsCounter');
      fpsCounter.innerText = `FPS: ${fps}`;

      // Draw block count
      const blockCountDisplay = document.getElementById('blockCount');
      blockCountDisplay.innerText = `Blocks: ${blockCount}`;

      if (autoClickerEnabled) {
        clickSquare();
      }

      requestAnimationFrame(gameLoop);
    }

    gameLoop(performance.now());

    function updateBlockCount() {
      blockCount = squares.length;
    }

    function clickSquare() {
      if (squares.length > 0) {
        const squareIndex = Math.floor(Math.random() * squares.length);
        squares[squareIndex].size += 10;
        playSquareSound();
        blockCount++;
      }
    }

    function playButtonSound() {
      const buttonSound = document.getElementById('buttonSound');
      buttonSound.currentTime = 0;
      buttonSound.play();
    }

    function playSquareSound() {
      const squareSound = document.getElementById('squareSound');
      squareSound.currentTime = 0;
      squareSound.play();
    }
  </script>
</body>
</html>
