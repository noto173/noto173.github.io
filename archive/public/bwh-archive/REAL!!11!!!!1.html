<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glide Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            perspective: 1000px;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .scene {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(30deg);
            animation: glide 6s linear infinite alternate;
        }

        .cube {
            width: 100px;
            height: 100px;
            position: absolute;
            animation: spin 4s linear infinite;
            transform-style: preserve-3d;
        }

        .cube:nth-child(odd) {
            background: rgba(0, 0, 255, 0.7);
        }

        .cube:nth-child(even) {
            background: rgba(255, 0, 0, 0.7);
            animation-delay: 2s;
        }

        .cube div {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(0, 255, 0, 0.7);
            border: 2px solid #fff;
        }

        .cube .front  { transform: translateZ(50px); }
        .cube .back   { transform: translateZ(-50px); }
        .cube .right  { transform: rotateY(90deg) translateZ(50px); }
        .cube .left   { transform: rotateY(-90deg) translateZ(50px); }
        .cube .top    { transform: rotateX(90deg) translateZ(50px); }
        .cube .bottom { transform: rotateX(-90deg) translateZ(50px); }

        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        @keyframes glide {
            0%, 100% { transform: translate(-50%, -50%) rotateX(30deg); }
            50% { transform: translate(-50%, -50%) rotateX(-30deg); }
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="cube">
            <div class="front"></div>
            <div class="back"></div>
            <div class="right"></div>
            <div class="left"></div>
            <div class="top"></div>
            <div class="bottom"></div>
        </div>
        <div class="cube">
            <div class="front"></div>
            <div class="back"></div>
            <div class="right"></div>
            <div class="left"></div>
            <div class="top"></div>
            <div class="bottom"></div>
        </div>
        <div class="cube">
            <div class="front"></div>
            <div class="back"></div>
            <div class="right"></div>
            <div class="left"></div>
            <div class="top"></div>
            <div class="bottom"></div>
        </div>
        <div class="cube">
            <div class="front"></div>
            <div class="back"></div>
            <div class="right"></div>
            <div class="left"></div>
            <div class="top"></div>
            <div class="bottom"></div>
        </div>
    </div>
</body>
</html>
