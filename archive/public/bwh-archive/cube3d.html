      // Function to create a cube with individual video textures
      function createCube() {
        var geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);

        // Create a new video element and texture for each cube
        var video = document.createElement('video');
        video.src = base64Video;
        video.loop = true;
        video.muted = false; // Enable audio
        video.width = 640; // Set video width to 640 pixels for 480p quality
        video.height = 480; // Set video height to 480 pixels for 480p quality
        video.play();

        var texture = new THREE.VideoTexture(video);
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;
        texture.format = THREE.RGBFormat;

        var material = new THREE.MeshBasicMaterial({ map: texture });

        var cube = new THREE.Mesh(geometry, material);
        scene.add(cube);
        cubes.push({ cube, video, texture });
        cube.position.x = (Math.random() - 0.5) * 10;
        cube.position.y = (Math.random() - 0.5) * 10;
        cube.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 0.1,
          (Math.random() - 0.5) * 0.1,
          (Math.random() - 0.5) * 0.1
        );
      }

      // Function to update cube positions and render scene
      function animate() {
        requestAnimationFrame(animate);

        cubes.forEach(function (cubeData) {
          var cube = cubeData.cube;
          cube.rotation.x += 0.03;
          cube.rotation.y += 0.03;
          cube.rotation.z += 0.03;

          cube.position.add(cube.velocity);

          if (cube.position.x < -5 || cube.position.x > 5) {
            cube.velocity.x *= -1;
          }
          if (cube.position.y < -5 || cube.position.y > 5) {
            cube.velocity.y *= -1;
          }
          if (cube.position.z < -5 || cube.position.z > 5) {
            cube.velocity.z *= -1;
          }
        });

        // If the button is not clicked, spawn a cube every frame with audio after one minute
        if (!buttonClicked) {
          cubeSpawnTimer += 1;

          if (cubeSpawnTimer >= 60 * 60) { // One minute (60 seconds * 60 frames/second)
            createCube();
          }
        }

        renderer.render(scene, camera);
      }

      // Start the animation loop
      animate();

      // Button to create more cubes
      var addButton = document.createElement('button');
      addButton.id = 'addButton';
      addButton.innerHTML = 'Add Cube';
      addButton.addEventListener('click', function () {
        createCube();
        buttonClicked = true; // Mark the button as clicked
      });
      document.body.appendChild(addButton);
    </script>
