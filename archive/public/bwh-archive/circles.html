<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background-color: black;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas"></canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const circles = [];

        function Circle(x, y, radius, dx, dy) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.dx = dx;
            this.dy = dy;

            this.draw = function() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.closePath();
            }

            this.update = function() {
                if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                    this.dx = -this.dx;
                }

                if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                    this.dy = -this.dy;
                }

                this.x += this.dx;
                this.y += this.dy;

                // Check mouse distance
                const mouseX = event.x;
                const mouseY = event.y;

                const distance = Math.sqrt(Math.pow(this.x - mouseX, 2) + Math.pow(this.y - mouseY, 2));

                if (distance < 50) {
                    this.radius = 30;
                } else {
                    this.radius = 15;
                }

                this.draw();
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < circles.length; i++) {
                circles[i].update();
            }
        }

        for (let i = 0; i < 50; i++) {
            const radius = 15;
            const x = Math.random() * (canvas.width - radius * 2) + radius;
            const y = Math.random() * (canvas.height - radius * 2) + radius;
            const dx = (Math.random() - 0.5) * 2;
            const dy = (Math.random() - 0.5) * 2;

            circles.push(new Circle(x, y, radius, dx, dy));
        }

        canvas.addEventListener('mousemove', function(event) {
            for (let i = 0; i < circles.length; i++) {
                const mouseX = event.x;
                const mouseY = event.y;

                const distance = Math.sqrt(Math.pow(circles[i].x - mouseX, 2) + Math.pow(circles[i].y - mouseY, 2));

                if (distance < 50) {
                    circles[i].radius = 30;
                } else {
                    circles[i].radius = 15;
                }
            }
        });

        animate();
    </script>
</body>
</html>
