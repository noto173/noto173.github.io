<!DOCTYPE html>

<meta charset="UTF-8">
<title>canvas test</title>

<h1>canvas test</h1>
<canvas width="640" height="360" style="border: 1px solid black;"></canvas><br>
speed<br>
<input type="range" min="1" max="25" value="5"><br>
make sure to check the inspect element console for very useful debugging messages
<audio src="/testing/boing.mp3"></audio>
<img src="/testing/happy.png" hidden>

<script src="/js/notogame.js"></script>
<script>
const canvas = document.querySelector("canvas");
const boingaudio = document.querySelector("audio");
const happy = document.querySelector("img");
const slider = document.querySelector("input");

const ctx = canvas.getContext("2d");

let x;
let y;
let xdir;
let ydir;
let hue;
let boing_amount;

let Game = new NotoGame(setup, step);
Game.start();

function boing() {
    let clone = boingaudio.cloneNode();
    document.body.append(clone);
    clone.addEventListener("ended", function() {
        this.remove();
    })
    clone.play();
    boing_amount++;
    console.log(`boing #${boing_amount}`)
}

function setup() {
    x = 0;
    y = 0;
    xdir = 1 / 3;
    ydir = 4 / 9;
    hue = 0;
    boing_amount = 0;
}

function step(fpsFactor) {
    ctx.fillStyle = "rgb(255 255 255)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = `hsl(${hue} 100 50)`;
    ctx.fillRect(x, y, 50, 50);
    ctx.drawImage(happy, x, y);

    x += xdir * (slider.value / 5) * fpsFactor;
    if (x <= 0 || x >= canvas.width - 50) {
        x = Math.max(Math.min(x, canvas.width - 50), 0);
        xdir = 0 - xdir;
        boing();
    }

    y += ydir * (slider.value / 5) * fpsFactor;
    if (y <= 0 || y >= canvas.height - 50) {
        y = Math.max(Math.min(y, canvas.height - 50), 0);
        ydir = 0 - ydir;
        boing();
    }

    hue += fpsFactor / 30;
}
</script>
