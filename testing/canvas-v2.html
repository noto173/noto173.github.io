<!DOCTYPE html>

<meta charset="UTF-8">
<title>canvas test v2</title>

<h1>canvas test v2</h1>
<canvas width="640" height="360" style="border: 1px solid black;"></canvas><br>
speed<br>
<input id="speed" type="range" min="1" max="40" value="20"><br>
<button onclick="fellas.push(new fella());">spawn new fella</button><br>
<button onclick="fellas.push(new fella(true));">spawn king boing</button><br>
<button onclick="Game.pause();">pause boing</button><br>
<button onclick="Game.resume();">resume boing</button><br>
<button onclick="Game.stop();Game.start();">restart boings</button><br>
<input id="random" type="checkbox"> randomize starting values<br>
<input id="boingable" type="checkbox"> loop around walls<br>
<button onclick="document.querySelectorAll('audio').forEach(audio => {audio.remove()});">stop boing sounds</button>
make sure to check the inspect element console for very useful debugging messages
<img id="happy" src="/testing/happy.png" hidden>
<img id="crown" src="/testing/crown.png" hidden>

<script src="/js/notogame.js"></script>
<script>
class fella {
    x;
    y;
    xdir;
    ydir;
    hue;
    king;

    constructor(king) {
        this.x = Math.round(Math.random() * (canvas.width - 50)) * randomized.checked;
        this.y = Math.round(Math.random() * (canvas.height - 50)) * randomized.checked;
        this.xdir = 1 / 3 * (randomized.checked ? ((Math.round(Math.random()) * 2) - 1) : 1);
        this.ydir = 4 / 9 * (randomized.checked ? ((Math.round(Math.random()) * 2) - 1) : 1);
        this.hue = Math.round(Math.random() * 360) * randomized.checked;
        this.king = king || false;
    }

    update_and_draw(ctx, fpsFactor) {
        if (this.x > canvas.width) {
            this.x = this.x - canvas.width;
        }

        if (this.x < 0) {
            this.x = this.x + canvas.width;
        }

        if (this.y > canvas.height) {
            this.y = this.y - canvas.height;
        }

        if (this.y < 0) {
            this.y = this.y + canvas.height;
        }

        ctx.fillStyle = `hsl(${this.hue} 100 50)`;
        ctx.fillRect(this.x, this.y, 50, 50);
        ctx.drawImage(happy, this.x, this.y);
        if (this.king) {
            ctx.drawImage(crown, this.x, this.y - 4);
        }

        this.x += this.xdir * (slider.value / 20) * fpsFactor;
        if ((this.x <= 0 || this.x >= canvas.width - 50) && !boingable.checked) {
            this.x = Math.max(Math.min(this.x, canvas.width - 50), 0);
            this.xdir = 0 - this.xdir;
            boing();
        }

        this.y += this.ydir * (slider.value / 20) * fpsFactor;
        if ((this.y <= 0 || this.y >= canvas.height - 50) && !boingable.checked) {
            this.y = Math.max(Math.min(this.y, canvas.height - 50), 0);
            this.ydir = 0 - this.ydir;
            boing();
        }

        if (this.x > (canvas.width - 50)) {
            ctx.fillRect(this.x - canvas.width, this.y, 50, 50);
            ctx.drawImage(happy, this.x - canvas.width, this.y);
            if (this.king) {
                ctx.drawImage(crown, this.x - canvas.width, this.y - 4);
            }
        }

        if (this.y > (canvas.height - 50)) {
            ctx.fillRect(this.x, this.y - canvas.height, 50, 50);
            ctx.drawImage(happy, this.x, this.y - canvas.height);
            if (this.king) {
                ctx.drawImage(crown, this.x, this.y - canvas.height - 4);
            }
        }

        if (this.x > (canvas.width - 50) && this.y > (canvas.height - 50)) {
            ctx.fillRect(this.x - canvas.width, this.y - canvas.height, 50, 50);
            ctx.drawImage(happy, this.x - canvas.width, this.y - canvas.height);
            if (this.king) {
                ctx.drawImage(crown, this.x - canvas.width, this.y - canvas.height - 4);
            }
        }

        this.hue += fpsFactor / 30;
    }
}

const canvas = document.querySelector("canvas");
const boingaudio = new Audio("/testing/boing.mp3");
const happy = document.querySelector("#happy");
const crown = document.querySelector("#crown");
const slider = document.querySelector("#speed");
const randomized = document.querySelector("#random");
const boingable = document.querySelector("#boingable");

const ctx = canvas.getContext("2d");

let fellas = [];

let boing_amount = 0;

let Game = new NotoGame(setup, step);
Game.start();

function boing() {
    //return;
    let clone = boingaudio.cloneNode();
    document.body.append(clone);
    clone.addEventListener("ended", function() {
        this.remove();
    })
    clone.play();
    boing_amount++;
    console.log(`boing #${boing_amount}`)
}

function setup() {
    fellas = [new fella()];
}

function step(fpsFactor) {
    ctx.fillStyle = "rgb(255 255 255)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    fellas.forEach(guy => {
        guy.update_and_draw(ctx, fpsFactor);
    });
}
</script>
